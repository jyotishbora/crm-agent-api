<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Agent</title>
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1e293b;
            padding: 16px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
        }

        header h1 span {
            color: #60a5fa;
        }

        .status {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        #new-chat {
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        #new-chat:hover { background: #475569; }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }

        .message.assistant strong { color: #60a5fa; }

        .message.tool-status {
            align-self: flex-start;
            background: transparent;
            border: 1px dashed #475569;
            color: #94a3b8;
            font-size: 12px;
            padding: 6px 12px;
        }

        .message.thinking {
            align-self: flex-start;
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            font-style: italic;
        }

        .thinking-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }

        #input-area {
            background: #1e293b;
            padding: 16px 24px;
            border-top: 1px solid #334155;
        }

        #input-form {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }

        #message-input:focus { border-color: #3b82f6; }

        #message-input::placeholder { color: #64748b; }

        #send-btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        #send-btn:hover { background: #2563eb; }
        #send-btn:disabled { background: #475569; cursor: not-allowed; }

        .chart-container {
            width: 100%;
            min-height: 350px;
            border-radius: 8px;
            overflow: hidden;
            margin: 8px 0;
        }

        .message.assistant.has-chart {
            max-width: 90%;
            white-space: normal;
        }

        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-track { background: transparent; }
        #chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1><span>CRM</span> Agent</h1>
            <div class="status">
                <div class="status-dot"></div>
                Connected
            </div>
        </div>
        <button id="new-chat">New Chat</button>
    </header>

    <div id="chat-messages">
        <div class="message assistant">Hi! I'm your CRM assistant. Ask me anything about companies, deals, fundraisers, funds, people, or tasks.</div>
    </div>

    <div id="input-area">
        <form id="input-form">
            <textarea id="message-input" placeholder="Ask about your CRM data..." rows="1"></textarea>
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const inputForm = document.getElementById('input-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('new-chat');

        let threadId = crypto.randomUUID();

        function renderPlotlyCharts(el) {
            const text = el.textContent;
            const plotlyRegex = /```plotly\s*\n([\s\S]*?)```/g;
            let match;
            const parts = [];
            let lastIndex = 0;

            while ((match = plotlyRegex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({ type: 'text', content: text.slice(lastIndex, match.index) });
                }
                parts.push({ type: 'plotly', content: match[1].trim() });
                lastIndex = plotlyRegex.lastIndex;
            }

            if (parts.length === 0) return;

            if (lastIndex < text.length) {
                parts.push({ type: 'text', content: text.slice(lastIndex) });
            }

            el.textContent = '';
            el.classList.add('has-chart');

            parts.forEach(part => {
                if (part.type === 'text') {
                    const span = document.createElement('span');
                    span.style.whiteSpace = 'pre-wrap';
                    span.textContent = part.content;
                    el.appendChild(span);
                } else {
                    try {
                        const spec = JSON.parse(part.content);
                        const chartDiv = document.createElement('div');
                        chartDiv.className = 'chart-container';
                        el.appendChild(chartDiv);
                        const layout = spec.layout || {};
                        layout.autosize = true;
                        layout.margin = layout.margin || { l: 50, r: 30, t: 50, b: 50 };
                        Plotly.newPlot(chartDiv, spec.data, layout, { responsive: true, displayModeBar: false });
                    } catch (e) {
                        const pre = document.createElement('pre');
                        pre.textContent = part.content;
                        el.appendChild(pre);
                    }
                }
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        function addThinking() {
            const div = document.createElement('div');
            div.className = 'message thinking';
            div.innerHTML = 'Thinking<span class="thinking-dots"></span>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        messageInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        messageInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                inputForm.dispatchEvent(new Event('submit'));
            }
        });

        newChatBtn.addEventListener('click', function () {
            threadId = crypto.randomUUID();
            chatMessages.innerHTML = '';
            addMessage("Hi! I'm your CRM assistant. Ask me anything about companies, deals, fundraisers, funds, people, or tasks.", 'assistant');
        });

        inputForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;

            const thinkingEl = addThinking();
            let responseDiv = null;
            let toolStatusEl = null;

            try {
                const res = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: threadId }),
                });

                if (!res.ok) throw new Error(`Error: ${res.status}`);

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'tool_start') {
                            // Show tool usage status
                            if (toolStatusEl) toolStatusEl.remove();
                            toolStatusEl = document.createElement('div');
                            toolStatusEl.className = 'message tool-status';
                            toolStatusEl.textContent = `Using ${data.tool}...`;
                            chatMessages.appendChild(toolStatusEl);
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }

                        if (data.type === 'token') {
                            // Remove thinking indicator on first token
                            if (thinkingEl.parentNode) thinkingEl.remove();
                            if (toolStatusEl) { toolStatusEl.remove(); toolStatusEl = null; }

                            if (!responseDiv) {
                                responseDiv = document.createElement('div');
                                responseDiv.className = 'message assistant';
                                chatMessages.appendChild(responseDiv);
                            }
                            responseDiv.textContent += data.token;
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }

                        if (data.type === 'done') {
                            threadId = data.thread_id;
                        }
                    }
                }

                // Clean up if no tokens were streamed
                if (thinkingEl.parentNode) thinkingEl.remove();
                if (toolStatusEl) toolStatusEl.remove();
                if (!responseDiv) {
                    addMessage('No response received.', 'assistant');
                } else {
                    renderPlotlyCharts(responseDiv);
                }
            } catch (err) {
                if (thinkingEl.parentNode) thinkingEl.remove();
                if (toolStatusEl) toolStatusEl.remove();
                addMessage('Something went wrong. Please try again.', 'assistant');
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        });

        messageInput.focus();
    </script>
</body>
</html>
